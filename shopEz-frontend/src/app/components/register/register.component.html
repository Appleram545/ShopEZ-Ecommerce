<div class="auth-page">
  <div class="auth-card">
    <div class="auth-brand">🛍️ ShopEZ</div>
    <h2>Create Account</h2>
    <p class="auth-sub">Join us and start shopping!</p>

    <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" formControlName="name" placeholder="Ram" />
        <span
          class="err"
          *ngIf="
            registerForm.get('name')?.invalid &&
            registerForm.get('name')?.touched
          "
          >Name is required.</span
        >
      </div>
      <div class="form-group">
        <label>Email</label>
        <input
          type="email"
          formControlName="email"
          placeholder="ram@email.com"
        />
        <span
          class="err"
          *ngIf="
            registerForm.get('email')?.invalid &&
            registerForm.get('email')?.touched
          "
          >Valid email required.</span
        >
      </div>
      <div class="form-group">
        <label>Password</label>
        <input
          type="password"
          formControlName="password"
          placeholder="Min 6 characters"
        />
        <span
          class="err"
          *ngIf="
            registerForm.get('password')?.invalid &&
            registerForm.get('password')?.touched
          "
          >Min 6 characters required.</span
        >
      </div>
      <button type="submit" class="auth-btn" [disabled]="loading">
        {{ loading ? "Creating account..." : "Create Account" }}
      </button>
    </form>

    <p class="auth-link">
      Already have an account? <a routerLink="/login">Sign In</a>
    </p>
  </div>
</div>
